stages:
  generate:
    cmd: python src/generate_data.py
    deps:
      - src/generate_data.py
    params:
      - generate.n_samples
      - generate.noise
      - generate.random_state
    outs:
      - data/raw/dataset.csv

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/dataset.csv
    params:
      - train.test_size
      - train.random_state
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/train.csv
    params:
      - train.alpha
      - train.random_state
    outs:
      - models/model.pkl

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model.pkl
      - data/processed/test.csv
    metrics:
      - metrics/metrics.json:
          cache: false
    plots:
      - metrics/residuals_plot.png:
          cache: false
